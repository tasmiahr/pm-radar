# .github/workflows/scrape.yml — JobRadar Automated Scraper
#
# SCHEDULE: Every 6 hours on weekdays
# REQUIRED: Repo Settings → Actions → General → Read and write permissions
# OPTIONAL SECRETS:
#   GEMINI_API_KEY         aistudio.google.com → Get API Key (free)
#   NOTIFY_EMAIL_TO/FROM/PASS  Gmail notification
#   NOTIFY_DISCORD_WEBHOOK     Discord notification
#   DASHBOARD_URL          https://YOUR-USERNAME.netlify.app

name: JobRadar — Scrape & Update Dashboard

on:
  schedule:
    - cron: "0 */6 * * 1-5"   # every 6 hours, Mon-Fri
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to search (e.g. "product manager")'
        required: false
        default: "product manager"
      location:
        description: 'Location filter — comma separated for multiple: "usa", "usa,canada", "remote". Leave blank for all.'
        required: false
        default: "usa"

jobs:
  scrape:
    name: Scrape → Export → Commit → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      # 1. Checkout — jobs.db comes from repo (committed each run)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 3. Ensure data directory + log DB status
      - name: Prepare database
        run: |
          mkdir -p data
          if [ -f data/jobs.db ]; then
            echo "jobs.db found: $(du -sh data/jobs.db | cut -f1)"
          else
            echo "No jobs.db yet — will be created fresh"
          fi

      # 4. Scrape watchlist + global search
      - name: Scrape job listings
        run: |
          KEYWORD="${{ github.event.inputs.keyword || 'product manager' }}"
          LOCATION="${{ github.event.inputs.location || 'usa' }}"
          echo "Keyword: $KEYWORD | Location: $LOCATION"
          python run_scraper.py --keyword "$KEYWORD" --location "$LOCATION" --global --jobspy --builtin

      # 5. Auto-match against resume (skips if no GEMINI_API_KEY or resume)
      - name: Score jobs against resume
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_match.py --limit 80

      # 6. Export to JSON for dashboard
      - name: Export dashboard data
        run: python export_dashboard.py

      # 7. Read counts
      - name: Read job counts
        id: jobcount
        run: |
          NEW=$(python -c "import json; d=json.load(open('dashboard_data.json')); print(d.get('meta',{}).get('new_this_run',0))")
          TOTAL=$(python -c "import json; d=json.load(open('dashboard_data.json')); print(d.get('meta',{}).get('total',0))")
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "New: $NEW | Total: $TOTAL"

      # 8. Commit jobs.db + dashboard_data.json back to repo
      - name: Commit updated data
        run: |
          git config user.name  "JobRadar Bot"
          git config user.email "jobradar-bot@users.noreply.github.com"
          git add dashboard_data.json data/jobs.db
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 JobRadar: +${{ steps.jobcount.outputs.new }} new jobs [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      # 9. Notify if new jobs found
      - name: Send notifications
        if: steps.jobcount.outputs.new != '0'
        env:
          NOTIFY_EMAIL_TO:        ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM:      ${{ secrets.NOTIFY_EMAIL_FROM }}
          NOTIFY_EMAIL_PASS:      ${{ secrets.NOTIFY_EMAIL_PASS }}
          NOTIFY_DISCORD_WEBHOOK: ${{ secrets.NOTIFY_DISCORD_WEBHOOK }}
          NOTIFY_SLACK_WEBHOOK:   ${{ secrets.NOTIFY_SLACK_WEBHOOK }}
        run: |
          DASHBOARD_URL="${{ secrets.DASHBOARD_URL || format('https://{0}.github.io/jobradar', github.repository_owner) }}"
          python notify.py \
            --new   ${{ steps.jobcount.outputs.new }} \
            --total ${{ steps.jobcount.outputs.total }} \
            --dashboard-url "$DASHBOARD_URL"

      # 10. Summary
      - name: Print run summary
        run: |
          echo "## 📡 JobRadar Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New jobs found | ${{ steps.jobcount.outputs.new }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total in pipeline | ${{ steps.jobcount.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run time | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
